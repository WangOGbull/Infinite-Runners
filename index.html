<!DOCTYPE html><html><head><meta charset="UTF-8">

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>

  .depositBadge .material-icons { font-size: 14px; line-height: 1; color: #4ade80; }

  .dsPowersGrid { width: min(92%, 880px); display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 10px; margin-bottom: 12px; }
  @media (min-width: 900px) { .dsPowersGrid { grid-template-columns: repeat(4, 1fr); } }
  .dsPowerCard { background: rgba(8,18,36,0.58); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.16); border-radius: 14px; padding: 10px 14px; display: flex; flex-direction: column; gap: 8px; transition: all 0.2s; box-shadow: 0 4px 14px rgba(0,0,0,0.18); }
  .dsPowerCard:hover { border-color: rgba(72,224,255,0.45); background: rgba(8,18,36,0.68); }

  .dsUpgradeBtn { padding: 5px 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.35); background: linear-gradient(180deg, #4ade80, #16a34a); color: #fff; font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 11px; letter-spacing: 1px; cursor: pointer; transition: all 0.2s; white-space: nowrap; display: flex; align-items: center; gap: 4px; box-shadow: 0 3px 10px rgba(22,163,74,0.35); }

  .dsSelectRow { display: flex; align-items: center; justify-content: center; gap: 12px; margin-top: 4px; margin-bottom: 12px; }
  .dsSelectBadge { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 12px; letter-spacing: 1px; padding: 6px 14px; border-radius: 20px; background: rgba(8,18,36,0.55); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); border: 1px solid rgba(255,107,107,0.5); color: #ff6b6b; }

  /* ===== DRAGON AGE STAKE MODAL (Matchmaking) ===== */
  .daModalOverlay { position: absolute; inset: 0; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(4px); }
  .daStakeModal { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; max-width: 420px; background: linear-gradient(180deg, #0a1628 0%, #06122e 100%); border: 1px solid rgba(201, 168, 76, 0.3); border-radius: 16px; padding: 32px 24px; box-shadow: 0 0 60px rgba(0, 180, 216, 0.1), inset 0 0 40px rgba(201, 168, 76, 0.05); text-align: center; }

  .daStakeTiers { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }

  .daTierBtn.medium { border-color: rgba(234, 179, 8, 0.3); }

  .daTierBtn.high { border-color: rgba(239, 68, 68, 0.3); }

  .daTierBtn.medium .daTierGlow { background: linear-gradient(180deg, #eab308, #ca8a04); }
  .daTierBtn.high .daTierGlow { background: linear-gradient(180deg, #ef4444, #dc2626); }

  .daTierBtn.low .daTierDot { background: #22c55e; border-color: #22c55e; box-shadow: 0 0 8px rgba(34, 197, 94, 0.4); }
  .daTierBtn.medium .daTierDot { background: #eab308; border-color: #eab308; box-shadow: 0 0 8px rgba(234, 179, 8, 0.4); }
