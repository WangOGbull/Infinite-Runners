<!-- ===== DRAGON DETAIL MODAL (Dragon Age Style) ===== -->
<div id="dragonDetailModal" class="screen">
  <div class="ddmOverlay">
    <div class="ddmBox" id="ddmBox">
      <button class="ddmClose" id="btnDdmClose"><i data-lucide="x"></i></button>
      <div class="ddmContent">
        <div class="ddmLeft">
          <div class="ddmImgWrap">
            <img id="ddmImg" src="" alt="Dragon">
          </div>
          <div class="ddmName" id="ddmName">AEGIS</div>
          <div class="ddmTier">TIER <span id="ddmTierNum">1</span> &nbsp;|&nbsp; DRAGON LEVEL <span id="ddmDragonLevel">1</span></div>
        </div>
        <div class="ddmRight">
          <div class="ddmSection">
            <h3><i data-lucide="shield"></i> Powers & Abilities</h3>
            <div class="ddmStats" id="ddmStats"></div>
          </div>
          <div class="ddmSection">
            <h3><i data-lucide="zap"></i> Special Powers</h3>
            <div class="ddmSpecials" id="ddmSpecials">
              <div class="ddmSpecialSlot"><i data-lucide="lock"></i><span>Dragon Fury — Unlock at Level 5</span></div>
              <div class="ddmSpecialSlot"><i data-lucide="lock"></i><span>Ancient Breath — Unlock at Level 10</span></div>
              <div class="ddmSpecialSlot"><i data-lucide="lock"></i><span>Infinity Blaze — Unlock at Level 15</span></div>
            </div>
          </div>
          <button class="ddmSelectBtn" id="btnDdmSelect">SELECT DRAGON</button>
        </div>
      </div>
    </div>
  </div>
</div>
